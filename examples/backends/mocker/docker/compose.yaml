#
# Run from repository root:
#   docker compose -f examples/backends/mocker/docker/compose.yaml up --build
#
# Then:
#   curl -s localhost:8000/v1/models | jq .

services:
  dynamo-mocker-vllm:
    build:
      context: ../../../..
      dockerfile: examples/backends/mocker/docker/Dockerfile
      args:
        AI_DYNAMO_VERSION: "${AI_DYNAMO_VERSION:-1.0.1}"
    image: dynamo-mocker-vllm:local
    ports:
      - "${HTTP_PORT:-8000}:8000"
      # Mock LoRA admin (one port per default model: 1.5B -> 8001, 7B -> 8002). Override base via MOCKER_MOCK_LORA_ADMIN_PORT_BASE.
      - "8001:8001"
      - "8002:8002"
    environment:
      HTTP_PORT: "8000"
      HF_TOKEN: "${HF_TOKEN:-}"
      MOCK_SPEEDUP: "${MOCK_SPEEDUP:-100000}"
      ROUTER_MODE: "${ROUTER_MODE:-round-robin}"
      # Space-separated HF model ids to mock (default entrypoint uses two DeepSeek distill models).
      MOCKER_MODELS: "${MOCKER_MODELS:-}"
      MOCKER_EXTRA_ARGS: "${MOCKER_EXTRA_ARGS:-}"
      # Per-model mock LoRA HTTP (load/unload); entrypoint defaults to 1 if unset.
      MOCKER_DYNAMIC_LORA_ADMIN: "${MOCKER_DYNAMIC_LORA_ADMIN:-1}"
